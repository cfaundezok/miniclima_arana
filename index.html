<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Clima en Arana</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 30px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      display: inline-block;
      min-width: 250px;
    }

    .value {
      font-size: 28px;
      margin: 10px 0;
    }

    .ok { color: #22c55e; }
    .warn { color: #facc15; }
    .bad { color: #ef4444; }
  </style>
</head>

<body>

<h1>🌦️ Clima en Tiempo Real</h1>

<div class="card">
  <div>Temperatura</div>
  <div class="value" id="temp">--</div>

  <div>Presión</div>
  <div class="value" id="pressure">--</div>

  <div>Estado</div>
  <div class="value" id="state">--</div>
</div>

<script>

// 🔴 CAMBIAR ESTO POR TU IP
const ESP32_URL = "http://192.168.1.XX/data";

async function update() {
  try {
    const res = await fetch(ESP32_URL);
    const data = await res.json();

    document.getElementById("temp").innerText = data.temp + " °C";
    document.getElementById("pressure").innerText = data.pressure + " hPa";

    const stateEl = document.getElementById("state");
    stateEl.innerText = data.state;

    // colores simples
    stateEl.className = "value " +
      (data.state === "ESTABLE" ? "ok" :
       data.state === "INESTABLE" ? "warn" : "bad");

  } catch (e) {
    console.log("Error:", e);
  }
}

setInterval(update, 5000);
update();

</script>

</body>
</html>
