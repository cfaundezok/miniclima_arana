<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Estación Casa</title>
<style>
  body { font-family: sans-serif; background:#111; color:#eee; text-align:center; padding-top:50px; }
  .dato { font-size: 2em; margin: 20px; }
</style>
</head>
<body>
  <h1>🏠 Estación Meteorológica</h1>
  <div class="dato">🌡 Temp: <span id="temp">--</span> °C</div>
  <div class="dato">📈 Presión: <span id="presion">--</span> hPa</div>
  <div class="dato">⛰ Altitud: <span id="altitud">--</span> m</div>
  <p id="fecha"></p>

<script>
const URL = "https://script.google.com/macros/s/AKfycby26DBC7O7CecYlb9Ka_Ks8ywn65pVaUlzW4yb90iVrpmoDfofQuWzVQ0PZEg9EdMCpyQ/exec";

fetch(URL)
  .then(r => r.json())
  .then(data => {
    document.getElementById("temp").innerText = data.temperatura;
    document.getElementById("presion").innerText = data.presion;
    document.getElementById("altitud").innerText = data.altitud;
    document.getElementById("fecha").innerText = "Última actualización: " + data.fecha;
  });
</script>
</body>
</html>
